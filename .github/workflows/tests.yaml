name: "Tests"

on:
  # pull_request:
  # push:
  #   branches:
  #     - "4.x"
  #     - "master"
  workflow_dispatch:

jobs:
  run_test_suite:
    name: "PHP ${{ matrix.php_version }} - Laravel ${{ matrix.laravel_version }} - ${{ matrix.composer_stability }}"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        composer_stability:
          - "prefer-lowest"
          - "prefer-stable"
        laravel_version:
          - "10"
          - "11"
          - "12"
        php_version:
          - "8.2"
          - "8.3"
          - "8.4"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v6"

      - name: "Build container"
        working-directory: "environments/docker"
        run: |
          docker compose build \
            '--build-arg=VERSION=${{ matrix.php_version }}' \
            php

      - name: "Install PHP dependencies"
        working-directory: "environments/docker"
        run: |
          docker compose run \
            --rm \
            php \
              composer update \
                '--${{ matrix.composer_stability }}' \
                '--no-interaction' \
                '--no-progress' \
                '--prefer-dist' \
                '--with=illuminate/contracts:^${{ matrix.laravel_version }}' \
                '--with=illuminate/database:^${{ matrix.laravel_version }}' \
                '--with=illuminate/support:^${{ matrix.laravel_version }}'

      - name: "Run test suite"
        working-directory: "environments/docker"
        run: |
          docker compose run \
            --rm \
            php \
              composer run-script test
